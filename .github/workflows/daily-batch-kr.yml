name: KR Market Daily Update
# 설명: 한국 시장(KOSPI, KOSDAQ) 전용 데일리 업데이트 (매일 한국시간 17:00 실행)

on:
  # 데일리 배치 실행을 중단하기 위해 아래 스케줄 부분을 주석 처리했어.
  # schedule:
  #   - cron: '0 8 * * *' # UTC 08:00 = KST 17:00
  workflow_dispatch: # 수동 실행 기능은 남겨둠

jobs:
  kr-daily-routine:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Server
        run: curl https://quantgravity-backend.onrender.com/
      
      # 1. 한국 주가 업데이트
      - name: KR Stock Stock Price Update
        timeout-minutes: 15
        run: |
          echo "🚀 [KR] 한국 시장 주가 업데이트 시작..."
          curl -X POST https://quantgravity-backend.onrender.com/api/fmp/daily-update-all \
          -H "Content-Type: application/json" \
          -H "x-batch-key: ${{ secrets.BATCH_SECRET_KEY }}" \
          -d '{"days": 3, "market": "KR"}'

      # [추가할 부분] 5분(300초) 대기하여 백그라운드 데이터 저장이 끝날 때까지 기다림
      - name: Wait for DB Sync
        run: sleep 300

      # 2. 마켓맵/통계 갱신 (한국장 반영)   
      - name: Update Market Stats
        run: |
          echo "📊 [KR] 한국 시장 통계 집계 시작..."
          curl -X POST https://quantgravity-backend.onrender.com/api/batch/update-stats \
          -H "Content-Type: application/json" \
          -H "x-batch-key: ${{ secrets.BATCH_SECRET_KEY }}" \
          -d '{"country": "KR"}'